<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instituto Fala Que Eu Te Escuto</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.painel{
    background:#fff;
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h1{
    font-size:24px;
    margin-bottom:20px;
    color:#222;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

.botao{
    display:block;
    background:#16a34a;
    color:#fff;
    text-decoration:none;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.horario{
    margin-top:15px;
    color:#555;
    font-size:15px;
}

.contador{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:#222;
}
</style>
</head>

<body>

<div class="painel">

<img src="logo.png" class="logo">

<h1>Instituto Fala Que Eu Te Escuto</h1>

<input type="text" placeholder="Digite seu apelido">

<input type="number" placeholder="Digite sua idade">

<a class="botao" href="tel:+5521994261237">
LIGAR ATENDIMENTO 1
</a>

<a class="botao" href="tel:+5521968740462">
LIGAR ATENDIMENTO 2
</a>

<a class="botao" href="tel:+5521973151585">
LIGAR ATENDIMENTO 3
</a>

<a class="botao" href="tel:+5521983722045">
LIGAR ATENDIMENTO 4
</a>

<p class="horario">
Atendimento das 21h às 23h
</p>

<div class="contador">
Total de ligações:
<span id="total">0</span>
</div>

</div>

<script>
let total = localStorage.getItem("totalLigacoes") || 0;
document.getElementById("total").innerText = total;

function contarLigacao(){
    total++;
    localStorage.setItem("totalLigacoes", total);
    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
